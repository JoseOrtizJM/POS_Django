{% extends 'catalogo/base.html' %}
{% load static %}

{% block title %}Editar Producto - POS{% endblock %}

{% block content %}
<div class="row justify-content-center my-4">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header" style="background-color: var(--dark-secondary);">
                <h4 class="mb-0">
                    <i class="fas fa-edit"></i> Editar Producto
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input type="text" name="nombre" class="form-control" required value="{{ producto.nombre }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Marca <span class="text-danger">*</span></label>
                            <input type="text" name="marca" class="form-control" required value="{{ producto.marca }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Gramaje <span class="text-danger">*</span></label>
                            <input type="text" name="gramaje" class="form-control" required value="{{ producto.gramaje }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Categoría <span class="text-danger">*</span></label>
                            <select name="categoria" class="form-select" required>
                                {% for cat in categorias %}
                                    <option value="{{ cat.id }}" {% if cat.id == producto.categoria.id %}selected{% endif %}>
                                        {{ cat.nombre }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Tipo de Paquete <span class="text-danger">*</span></label>
                            <input type="text" name="tipo_paquete" class="form-control" required value="{{ producto.tipo_paquete }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Piezas por Paquete <span class="text-danger">*</span></label>
                            <input type="number" name="piezas_por_paquete" class="form-control" required min="1" value="{{ producto.piezas_por_paquete }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio ($) <span class="text-danger">*</span></label>
                            <input type="number" name="precio" class="form-control" required min="0" step="0.01" value="{{ producto.precio }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock <span class="text-danger">*</span></label>
                            <input type="number" name="stock" class="form-control" required min="0" value="{{ producto.stock }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Imagen</label>
                            <input type="file" name="imagen" class="form-control" accept="image/*">
                            {% if producto.imagen %}
                                <small class="form-text text-muted">Imagen actual: {{ producto.imagen.name }}</small>
                            {% endif %}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3">{{ producto.descripcion }}</textarea>
                    </div>

                    <hr style="border-color: var(--dark-border);">

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                        <a href="{% url 'catalogo:admin_panel' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
