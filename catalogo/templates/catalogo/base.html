<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POS - Punto de Venta{% endblock %}</title>
    
    <!-- Bootstrap CSS (Dark) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --dark-bg: #3b3b3b;
            --dark-secondary: #676767;
            --dark-tertiary: #383636;
            --dark-border: #404040;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent-blue: #130961;
            --accent-green: #10b981;
            --accent-red: #ef4444;  
            --accent-yellow: #f59e0b;
        }

        * {
            color-scheme: dark;
        }

        html, body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
        }

        .navbar {
            background-color: var(--dark-secondary);
            border-bottom: 1px solid var(--dark-border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .navbar-brand {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary) !important;
            letter-spacing: 0.5px;
        }

        .navbar-brand i {
            margin-right: 8px;
            color: var(--accent-blue);
        }

        .navbar-toggler {
            border-color: var(--dark-border);
        }

        .navbar-toggler:focus {
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }

        .nav-link {
            color: var(--text-secondary) !important;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: var(--accent-blue) !important;
        }

        .container-main {
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .page-title {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 2rem;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
        }

        .page-title i {
            color: var(--accent-blue);
            margin-right: 10px;
        }

        .breadcrumb {
            background-color: transparent;
            padding: 0;
            margin-bottom: 1.5rem;
        }

        .breadcrumb-item {
            color: var(--text-secondary);
        }

        .breadcrumb-item a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .breadcrumb-item a:hover {
            color: var(--text-primary);
        }

        .breadcrumb-item.active {
            color: var(--text-primary);
            font-weight: 500;
        }

        footer {
            background-color: var(--dark-secondary) !important;
            border-top: 1px solid var(--dark-border);
            color: var(--text-secondary) !important;
        }

        /* Bootstrap overrides */
        .btn-primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .btn-primary:hover {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .alert {
            border: 1px solid var(--dark-border);
        }

        .alert-info {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .alert a {
            color: var(--accent-blue);
        }

        
    </style>
    {% block extra_css %}{% endblock %}

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'catalogo:dashboard' %}">
                <i class="fas fa-shopping-cart"></i> POS - Mayoreo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'catalogo:dashboard' %}">
                            <i class="fas fa-home"></i> Inicio
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container-main">
        <div class="container-lg">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 POS - Sistema de Punto de Venta Mayoreo. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
