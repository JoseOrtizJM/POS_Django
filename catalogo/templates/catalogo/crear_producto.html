{% extends 'catalogo/base.html' %}
{% load static %}

{% block title %}Crear Producto - POS{% endblock %}

{% block content %}
<div class="row justify-content-center my-4">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header" style="background-color: var(--dark-secondary);">
                <h4 class="mb-0">
                    <i class="fas fa-plus"></i> Nuevo Producto
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input type="text" name="nombre" class="form-control" required placeholder="Ej: Aceite de Oliva">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Marca <span class="text-danger">*</span></label>
                            <input type="text" name="marca" class="form-control" required placeholder="Ej: Gallo">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Gramaje <span class="text-danger">*</span></label>
                            <input type="text" name="gramaje" class="form-control" required placeholder="Ej: 1000ml">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Categoría <span class="text-danger">*</span></label>
                            <select name="categoria" class="form-select" required>
                                <option value="">Selecciona una categoría</option>
                                {% for cat in categorias %}
                                    <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Tipo de Paquete <span class="text-danger">*</span></label>
                            <input type="text" name="tipo_paquete" class="form-control" required placeholder="Ej: Caja">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Piezas por Paquete <span class="text-danger">*</span></label>
                            <input type="number" name="piezas_por_paquete" class="form-control" required min="1" placeholder="Ej: 12">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio ($) <span class="text-danger">*</span></label>
                            <input type="number" name="precio" class="form-control" required min="0" step="0.01" placeholder="Ej: 250.50">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock <span class="text-danger">*</span></label>
                            <input type="number" name="stock" class="form-control" required min="0" placeholder="Ej: 100">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Imagen</label>
                            <input type="file" name="imagen" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3" placeholder="Descripción del producto"></textarea>
                    </div>

                    <hr style="border-color: var(--dark-border);">

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Guardar Producto
                        </button>
                        <a href="{% url 'catalogo:admin_panel' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
