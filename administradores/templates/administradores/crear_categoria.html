{% extends 'catalogo/base.html' %}
{% load static %}

{% block title %}Nueva Categoría - POS{% endblock %}

{% block content %}
<div class="row justify-content-center my-4">
    <div class="col-md-7">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'administradores:listar_categorias' %}" class="btn btn-outline-secondary me-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h2 class="mb-0"><i class="fas fa-plus-circle"></i> Nueva Categoría</h2>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Nombre *</label>
                            <input type="text" name="nombre" class="form-control"
                                   placeholder="Nombre de la categoría" required autofocus>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Icono (emoji) *</label>
                            <input type="text" name="icono_emoji" class="form-control"
                                   value="📦" maxlength="10" placeholder="📦">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="3"
                                      placeholder="Descripción opcional..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Imagen (opcional)</label>
                            <input type="file" name="imagen" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Guardar Categoría
                        </button>
                        <a href="{% url 'administradores:listar_categorias' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
