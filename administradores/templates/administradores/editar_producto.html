{% extends 'catalogo/base.html' %}
{% load static %}

{% block title %}Editar Producto - POS{% endblock %}

{% block content %}
<div class="row justify-content-center my-4">
    <div class="col-md-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'administradores:listar_productos' %}" class="btn btn-outline-secondary me-3">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h2 class="mb-0"><i class="fas fa-edit"></i> Editar: {{ producto.nombre }}</h2>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre *</label>
                            <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Marca *</label>
                            <input type="text" name="marca" class="form-control" value="{{ producto.marca }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Gramaje / Volumen *</label>
                            <input type="text" name="gramaje" class="form-control" value="{{ producto.gramaje }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Categoría *</label>
                            <select name="categoria" class="form-select" required>
                                {% for cat in categorias %}
                                    <option value="{{ cat.id }}" {% if cat.id == producto.categoria.id %}selected{% endif %}>
                                        {{ cat.icono_emoji }} {{ cat.nombre }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tipo de Paquete *</label>
                            <select name="tipo_paquete" class="form-select" required>
                                <option value="Paquete" {% if producto.tipo_paquete == "Paquete" %}selected{% endif %}>Paquete</option>
                                <option value="Caja"    {% if producto.tipo_paquete == "Caja"    %}selected{% endif %}>Caja</option>
                                <option value="Bulto"   {% if producto.tipo_paquete == "Bulto"   %}selected{% endif %}>Bulto</option>
                                <option value="Costal"  {% if producto.tipo_paquete == "Costal"  %}selected{% endif %}>Costal</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Piezas por Paquete *</label>
                            <input type="number" name="piezas_por_paquete" class="form-control" min="1" value="{{ producto.piezas_por_paquete }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Precio (MXN) *</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" name="precio" class="form-control" step="0.01" min="0" value="{{ producto.precio }}" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Stock (paquetes)</label>
                            <input type="number" name="stock" class="form-control" min="0" value="{{ producto.stock }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="3">{{ producto.descripcion }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Imagen del Producto</label>
                            {% if producto.imagen %}
                                <div class="mb-2">
                                    <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}" style="height: 80px; border-radius: 6px;">
                                    <small class="text-muted ms-2">Imagen actual</small>
                                </div>
                            {% endif %}
                            <input type="file" name="imagen" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                        <a href="{% url 'administradores:listar_productos' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
